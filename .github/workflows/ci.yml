name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck dtm dtm.sh install.sh bootstrap.sh modules/*.sh

  bats-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Print bash version
        run: bash --version | head -1
      - name: Run bats
        run: bats tests/

  bats-macos-bash32:
    # Run the test suite under macOS /bin/bash 3.2 — not homebrew bash 5.x.
    # bats-core works on bash 3.2.25+. We install bats-core but NOT bash,
    # then PATH-prefix /usr/bin:/bin so every `#!/usr/bin/env bash` (bats
    # wrapper, dtm, dtm.sh) resolves to /bin/bash. /opt/homebrew/bin stays
    # last so jq + the bats binary remain reachable. Running bats under brew
    # bash would silently mask 3.2 regressions; this is the only macOS bats
    # job, by design.
    runs-on: macos-latest
    env:
      # /usr/bin has no `bash` on macOS, so /usr/bin/env bash falls through
      # to /bin/bash (3.2). brew bin trails so it can't shadow it.
      PATH: /usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core + jq (no bash)
        run: brew install bats-core jq
      - name: Verify /usr/bin/env bash resolves to 3.2
        run: |
          /usr/bin/env bash --version | head -1
          /usr/bin/env bash -c '[[ "${BASH_VERSION%%.*}" == "3" ]] || { echo "expected bash 3, got $BASH_VERSION"; exit 1; }'
      - name: Parse install.sh + bootstrap.sh under /bin/bash
        # bats + dtm-smoke transitively cover dtm/dtm.sh/modules/*.sh and
        # every candidates/*.conf (doctor sources each via candidate_load),
        # but never invoke install.sh or bootstrap.sh — parse them explicitly.
        run: |
          /bin/bash -n install.sh
          /bin/bash -n bootstrap.sh
      - name: Run bats
        run: bats tests/
      - name: Smoke run dtm
        run: |
          ./dtm tools
          ./dtm doctor || true
