# Helm — Kubernetes package manager. Distributed by helm.sh as platform-specific
# tarballs (helm-v<version>-<os>-<arch>.tar.gz). The tarball's top-level dir is
# `<os>-<arch>/`, containing the helm binary plus LICENSE/README.md. We discard
# the docs and install only the binary at <install>/bin/helm. Versions come
# from helm/helm GitHub releases; only stable x.y.z tags are listed.
#
# Note: HELM_HOME is the legacy helm v2 config dir variable. Helm v3 ignores
# it (uses HELM_DATA_HOME / HELM_CONFIG_HOME / HELM_CACHE_HOME instead), so
# exposing it here as the install pointer is harmless for users on helm 3.x.

candidate_name=helm
candidate_home_var=HELM_HOME
candidate_bin_subdir=bin
candidate_binary_name=helm
candidate_binary_check=bin/helm
candidate_archive_format=tar.gz
candidate_archive_layout=nested_to_bin
candidate_download_url='https://get.helm.sh/helm-v${VERSION}-${OS}-${ARCH}.tar.gz'
candidate_checksum_url='https://get.helm.sh/helm-v${VERSION}-${OS}-${ARCH}.tar.gz.sha256sum'
candidate_checksum_algo=sha256
candidate_checksum_format=multi
candidate_os_linux=linux
candidate_os_mac=darwin
candidate_arch_x64=amd64
candidate_arch_aarch64=arm64
candidate_version_strategy=github_releases
candidate_version_strategy_arg=helm/helm
candidate_version_tag_prefix=v
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
