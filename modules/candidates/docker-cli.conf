# Docker CLI — the `docker` client only. Distributed by Docker Inc as static
# tarballs at download.docker.com. Tarball top-level dir is `docker/` and
# `archive_layout=nested` strips it so install_dir/<binary> goes straight on
# PATH; `bin_subdir` is empty because there is no bin/ subdir inside.
#
# Scope: this candidate exposes only the `docker` CLI. It does NOT install a
# working container runtime. The Linux tarball ships daemon binaries
# (dockerd, containerd, containerd-shim-runc-v2, ctr, runc, docker-init,
# docker-proxy) alongside the client, but dtm only activates `docker` —
# running the daemon properly needs a systemd unit, the `docker` group,
# /var/run/docker.sock permissions, iptables/nftables rules, cgroups, and a
# supported storage driver, none of which a user-space version manager can
# (or should) set up. The mac tarball is client-only by upstream design.
#
# To use the CLI you need a daemon endpoint reachable via DOCKER_HOST or the
# default socket — typically provided by colima, OrbStack, Docker Desktop, a
# remote host, or a system-package dockerd installed out-of-band.
#
# Versions come from scraping the static-binary HTML index at
# download.docker.com/linux/static/stable/x86_64/. Older releases used a
# `-ce` suffix (docker-17.03.0-ce.tgz); the version_filter below excludes
# those by requiring strict semver. The listing is linux-x86_64 only — mac
# and aarch64 archives generally track the same set, but a version present
# in `dtm available` may occasionally not exist for every os/arch.
#
# Note: download.docker.com does not publish .sha256 sidecars for static
# tarballs, so checksum verification is skipped. Override the host via
# DTM_DOCKER_DIST if you mirror the index internally.

candidate_name=docker-cli
candidate_home_var=DOCKER_CLI_HOME
candidate_bin_subdir=
candidate_binary_name=docker
candidate_binary_check=docker
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='${DTM_DOCKER_DIST}/${OS}/static/stable/${ARCH}/docker-${VERSION}.tgz'
candidate_os_linux=linux
candidate_os_mac=mac
candidate_arch_x64=x86_64
candidate_arch_aarch64=aarch64
candidate_version_strategy=dir_index
candidate_version_strategy_arg="${DTM_DOCKER_DIST}/linux/static/stable/x86_64/;docker-;.tgz"
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
