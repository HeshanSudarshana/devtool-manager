# Maven — Apache build tool. Distributed by archive.apache.org as
# apache-maven-<version>-bin.tar.gz; tarball top-level dir is `apache-maven-<version>/`,
# stripped to install_dir. Versions come from Maven Central's maven-metadata.xml.
# M2_HOME is exported alongside MAVEN_HOME for tools that still expect it.

candidate_name=maven
candidate_home_var=MAVEN_HOME
candidate_extra_vars=M2_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/mvn
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='${DTM_MAVEN_DIST}/maven-3/${VERSION}/binaries/apache-maven-${VERSION}-bin.tar.gz'
candidate_checksum_url='${DTM_MAVEN_DIST}/maven-3/${VERSION}/binaries/apache-maven-${VERSION}-bin.tar.gz.sha512'
candidate_checksum_algo=sha512
candidate_version_strategy=maven_central
candidate_version_strategy_arg=org/apache/maven/apache-maven
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
