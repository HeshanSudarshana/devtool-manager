# Terraform — published as zip on releases.hashicorp.com.
# The zip contains the `terraform` binary at root with no top-level dir, so we
# use archive_layout=flat_to_bin to install it as <install_dir>/bin/terraform.
# Versions come from HashiCorp's releases API, which marks pre-releases with
# is_prerelease=true (filtered out by the strategy).

candidate_name=terraform
candidate_home_var=TERRAFORM_HOME
candidate_bin_subdir=bin
candidate_binary_name=terraform
candidate_binary_check=bin/terraform
candidate_archive_format=zip
candidate_archive_layout=flat_to_bin
candidate_download_url='https://releases.hashicorp.com/terraform/${VERSION}/terraform_${VERSION}_${OS}_${ARCH}.zip'
candidate_checksum_url='https://releases.hashicorp.com/terraform/${VERSION}/terraform_${VERSION}_SHA256SUMS'
candidate_checksum_algo=sha256
candidate_checksum_format=multi
candidate_os_linux=linux
candidate_os_mac=darwin
candidate_arch_x64=amd64
candidate_arch_aarch64=arm64
candidate_version_strategy=hashicorp_releases
candidate_version_strategy_arg=terraform
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
