# sbt — Scala build tool. Distributed by sbt/sbt GitHub releases as a
# cross-platform tgz (sbt-<version>.tgz). Top-level dir is `sbt/`, stripped to
# install_dir. Each asset has a sibling .sha256 file containing
# `<hash>  <filename>`; single format works (first whitespace token).
# JVM-based, so no per-platform variants — no os/arch aliases needed.

candidate_name=sbt
candidate_home_var=SBT_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/sbt
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='https://github.com/sbt/sbt/releases/download/v${VERSION}/sbt-${VERSION}.tgz'
candidate_checksum_url='https://github.com/sbt/sbt/releases/download/v${VERSION}/sbt-${VERSION}.tgz.sha256'
candidate_checksum_algo=sha256
candidate_checksum_format=single
candidate_version_strategy=github_releases
candidate_version_strategy_arg=sbt/sbt
candidate_version_tag_prefix=v
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
