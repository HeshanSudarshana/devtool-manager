# Gradle — JVM build tool. Distributed by services.gradle.org as a -bin zip;
# top-level dir is `gradle-<version>/`, stripped to install_dir. Versions come
# from services.gradle.org/versions/all, filtered to non-snapshot non-RC GAs.

candidate_name=gradle
candidate_home_var=GRADLE_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/gradle
candidate_archive_format=zip
candidate_archive_layout=nested
candidate_download_url='${DTM_GRADLE_DIST}/distributions/gradle-${VERSION}-bin.zip'
candidate_checksum_url='${DTM_GRADLE_DIST}/distributions/gradle-${VERSION}-bin.zip.sha256'
candidate_checksum_algo=sha256
candidate_version_strategy=gradle_versions
candidate_version_filter='^[0-9]+\.[0-9]+(\.[0-9]+)?$'
