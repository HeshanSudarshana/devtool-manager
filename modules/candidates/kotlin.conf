# Kotlin compiler — published as a zip on JetBrains/kotlin GitHub releases.
# Top-level dir in the zip is `kotlinc/`; we strip it so install_dir contains
# bin/, lib/, etc. directly. Each release ships a sibling .zip.sha256 file
# (bare hash, single format) — confirmed back to 1.9.0.

candidate_name=kotlin
candidate_home_var=KOTLIN_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/kotlinc
candidate_archive_format=zip
candidate_archive_strip_top=1
candidate_download_url='https://github.com/JetBrains/kotlin/releases/download/v${VERSION}/kotlin-compiler-${VERSION}.zip'
candidate_checksum_url='https://github.com/JetBrains/kotlin/releases/download/v${VERSION}/kotlin-compiler-${VERSION}.zip.sha256'
candidate_checksum_algo=sha256
candidate_checksum_format=single
candidate_version_strategy=github_releases
candidate_version_strategy_arg=JetBrains/kotlin
candidate_version_tag_prefix=v
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
