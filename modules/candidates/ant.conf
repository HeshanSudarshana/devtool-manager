# Apache Ant — JVM build tool. Distributed by archive.apache.org as
# apache-ant-<version>-bin.tar.gz; tarball top-level dir is
# `apache-ant-<version>/`, stripped to install_dir. Versions come from the
# Apache dist directory listing via the apache_dist strategy. Checksum is a
# bare sha512 hash sidecar (single format).

candidate_name=ant
candidate_home_var=ANT_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/ant
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='${DTM_APACHE_DIST}/ant/binaries/apache-ant-${VERSION}-bin.tar.gz'
candidate_checksum_url='${DTM_APACHE_DIST}/ant/binaries/apache-ant-${VERSION}-bin.tar.gz.sha512'
candidate_checksum_algo=sha512
candidate_checksum_format=single
candidate_version_strategy=apache_dist
candidate_version_strategy_arg='ant/binaries;apache-ant-;-bin.tar.gz'
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
