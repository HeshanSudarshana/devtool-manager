# Scala 3 — Lightbend/EPFL Scala compiler. Released as platform-specific
# tarballs on scala/scala3 GitHub releases (e.g.
# scala3-<version>-<arch>-pc-linux.tar.gz). Top-level dir is
# scala3-<version>-<arch>-<os>/ which the nested layout strips. Each asset has
# a sibling .sha256 file containing `<hash>  <filename>`; treat as single since
# fetch_checksum_from_url picks the first whitespace token.
#
# Per-arch URL components are encoded via os_*/arch_* aliases:
#   linux  → x86_64-pc-linux / aarch64-pc-linux
#   mac    → x86_64-apple-darwin / aarch64-apple-darwin

candidate_name=scala
candidate_home_var=SCALA_HOME
candidate_bin_subdir=bin
candidate_binary_check=bin/scala
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='https://github.com/scala/scala3/releases/download/${VERSION}/scala3-${VERSION}-${ARCH}-${OS}.tar.gz'
candidate_checksum_url='https://github.com/scala/scala3/releases/download/${VERSION}/scala3-${VERSION}-${ARCH}-${OS}.tar.gz.sha256'
candidate_checksum_algo=sha256
candidate_checksum_format=single
candidate_os_linux=pc-linux
candidate_os_mac=apple-darwin
candidate_arch_x64=x86_64
candidate_arch_aarch64=aarch64
candidate_version_strategy=github_releases
candidate_version_strategy_arg=scala/scala3
candidate_version_filter='^[0-9]+\.[0-9]+\.[0-9]+$'
