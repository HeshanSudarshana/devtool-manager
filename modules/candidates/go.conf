# Go — distributed by go.dev as go<version>.<os>-<arch>.tar.gz. Tarball
# top-level dir is `go/`, stripped to install_dir. Checksum lives at
# dl.google.com/go/<file>.sha256 (separate host from the download index).
# version_tag_prefix=go strips the "go" prefix from upstream "go1.22.0" tags.
#
# Go also needs a per-version GOPATH so installed tooling stays scoped to
# the active toolchain. The engine's workspace_var support creates
# DTM_ROOT/go-workspaces/<version>/{src,pkg,bin} on pull, exports it as
# GOPATH on set/use, and prepends GOPATH/bin to PATH after GOROOT/bin.

candidate_name=go
candidate_home_var=GOROOT
candidate_bin_subdir=bin
candidate_binary_check=bin/go
candidate_archive_format=tar.gz
candidate_archive_layout=nested
candidate_download_url='${DTM_GO_DIST}/dl/go${VERSION}.${OS}-${ARCH}.tar.gz'
candidate_checksum_url='${DTM_GO_CHECKSUM}/go${VERSION}.${OS}-${ARCH}.tar.gz.sha256'
candidate_checksum_algo=sha256
candidate_os_linux=linux
candidate_os_mac=darwin
candidate_arch_x64=amd64
candidate_arch_aarch64=arm64
candidate_version_strategy=go_dl
candidate_version_tag_prefix=go
candidate_version_filter='^[0-9]+\.[0-9]+(\.[0-9]+)?$'
candidate_workspace_var=GOPATH
candidate_workspace_subdir=go-workspaces
candidate_workspace_bin=bin
candidate_workspace_init=src,pkg,bin
